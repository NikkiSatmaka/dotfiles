# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin "sainnhe/tmux-fzf"
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'catppuccin/tmux alias=catppuccin'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"

# Set default shell
set -g default-shell /bin/zsh

# Setting the prefix from C-b to C-g
set -g prefix C-g

# Free the original C-b prefix keybinding
unbind C-b

# setting the delay between prefix and command
set -s escape-time 0

# Set the base index to 1 instead of 0
set -g base-index 1         # for windows
setw -g pane-base-index 1    # for panes
set -g renumber-windows on

# Reload the file with Prefix r
bind r source-file ~/.config/tmux/tmux.conf\; display "Reloaded!"

# splitting panes with v and s
bind v split-window -h
bind s split-window -v

# split pane and retain the current directory of existing pane​
bind _ split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# # moving between panes with Prefix h, j, k, l
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Quick window selection
# bind -r C-h select-window -t :-
# bind -r C-l select-window -t :+
bind -r C-Left select-window -t :-
bind -r C-Right select-window -t :+

# Pane resizing with Prefix Shift-Arrow
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r - resize-pane -U 5
bind -r + resize-pane -D 5
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# Pane swaps with Ctrl-Shift-Arrow
bind-key C-S-Left swap-window -d -t -1
bind-key C-S-Right swap-window -d -t +1

# mouse support
set -g mouse on

# Stay in tmux when session closes
set -g detach-on-destroy off

# Update status line every sixty seconds
set -g status-interval 60

# enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# enable vi keys
setw -g mode-keys vi
setw -g xterm-keys on # for vim

# shortcut for synchronize-panes toggle
bind C-s setw synchronize-panes

# clear screen shortcut
bind C-l send-keys 'C-l'

# Copy and paste
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -sel clip -i'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -se c -i'
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"  # paste from system clipboard
unbind p
bind p paste-buffer
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"

# tmux-menus
set -g @menus_trigger 'Space'
set -g @menus_config_file "~/.configs/tmux.conf"

# Apppearance
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, or mocha
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none

